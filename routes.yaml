# =============================================================================
# routes.yaml · Swarnil theme
# Upload in Ghost Admin → Settings → Labs → Routes.
# NOTE: Ghost requires trailing slashes on all custom routes.
# =============================================================================

routes:
  /:
    template: home
  /signin/:
    template: signin
  /signup/:
    template: signup
  /tags/:
    template: tags

collections:
  # Guides — same container/child shape as courses. The guide landing post is
  # tagged #guide; its steps are tagged #guide-content and take the guide's
  # PUBLIC tag as their primary tag, so they nest under it:
  #   /guide/{guide-tag}/{step-slug}/
  # Steps must be listed before /guide/ so the deeper permalink wins.
  /guide-steps/:
    permalink: /guide/{primary_tag}/{slug}/
    filter: tag:hash-guide-content
    order: published_at asc
    template: guide-steps

  /guide/:
    permalink: /guide/{slug}/
    filter: tag:hash-guide
    template: guide

  # Lessons live INSIDE their course: /courses/{course-tag}/{lesson-slug}/
  # A lesson's FIRST (primary) tag must be the course's public tag.
  /lessons-index/:
    permalink: /courses/{primary_tag}/{slug}/
    filter: tag:hash-lesson
    template: lessons

  /courses/:
    permalink: /courses/{slug}/
    filter: tag:hash-course
    template: courses

  # Episodes live INSIDE their series: /webseries/{series-tag}/{episode-slug}/
  /episodes-index/:
    permalink: /webseries/{primary_tag}/{slug}/
    filter: tag:hash-episode
    order: published_at asc
    template: episodes

  /webseries/:
    permalink: /webseries/{slug}/
    filter: tag:hash-webseries
    template: webseries

  /videos/:
    permalink: /videos/{slug}/
    filter: tag:hash-video
    template: videos

  # Project build-logs live INSIDE their project: /projects/{project-tag}/{slug}/
  # A #project-detail post's FIRST (primary) tag must be the project's public tag.
  /project-steps-index/:
    permalink: /projects/{primary_tag}/{slug}/
    filter: tag:hash-project-detail
    order: published_at asc
    template: project-details

  /projects/:
    permalink: /projects/{slug}/
    filter: tag:hash-project
    template: projects

  /products/:
    permalink: /products/{slug}/
    filter: tag:hash-product
    template: products

  /timeline/:
    permalink: /timeline/{slug}/
    filter: tag:hash-timeline
    order: published_at desc
    template: timeline

  /changelog/:
    permalink: /changelog/{slug}/
    filter: tag:hash-changelog
    template: changelog

  /newsletters/:
    permalink: /newsletters/{slug}/
    filter: tag:hash-newsletter
    template: newsletters

  /shop/:
    permalink: /shop/{slug}/
    filter: tag:hash-shop
    template: shop

  # Travel: trips are containers (like courses); travel posts live INSIDE their
  # trip: /travel/{trip-tag}/{post-slug}/. A travel post's FIRST (primary) tag
  # must be the trip's public tag. Countries/categories ride along as internal
  # tags: #country-india, #travel-category-beach …
  /travel-index/:
    permalink: /travel/{primary_tag}/{slug}/
    filter: tag:hash-travel
    order: published_at asc
    template: travels

  /travel/:
    permalink: /travel/{slug}/
    filter: tag:hash-trip
    template: travel

  /blog/:
    permalink: /blog/{slug}/
    filter: tag:hash-blog
    template: blog

  # Prompts (chat-styled) and code snippets are separate collections
  /prompts/:
    permalink: /prompts/{slug}/
    filter: tag:hash-prompt
    template: prompts

  /snippets/:
    permalink: /snippets/{slug}/
    filter: tag:hash-snippet
    template: snippets

  # Experiences — life "moments" (photo + story)
  /experiences/:
    permalink: /experiences/{slug}/
    filter: tag:hash-experience
    template: experiences

  # Docs — theme documentation, grouped by docs-* section tags
  /docs/:
    permalink: /docs/{slug}/
    filter: tag:hash-docs
    order: published_at asc
    template: docs

  # Catch-all archive: everything, lazy-loaded
  /archive/:
    permalink: /archive/{slug}/
    template: archive

taxonomies:
  tag: /tag/{slug}/
  author: /author/{slug}/
