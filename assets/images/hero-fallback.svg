<?xml version="1.0" encoding="UTF-8"?>
<!-- Hero fallback — shown behind/instead of the hero video when the embed is
     blocked, still loading, or fails. 1280x720 (16:9) to match the frame
     exactly, so there is no layout shift when the video swaps in.
     Monochrome + grid, matching the theme's own pattern language. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720" role="img" aria-labelledby="hf-title">
	<title id="hf-title">Swarnil — viewfinder frame</title>
	<defs>
		<pattern id="hf-grid" width="40" height="40" patternUnits="userSpaceOnUse">
			<path d="M40 0H0V40" fill="none" stroke="#d4d4d8" stroke-width="1" />
		</pattern>
		<radialGradient id="hf-vignette" cx="50%" cy="46%" r="72%">
			<stop offset="0%" stop-color="#fafafa" stop-opacity="1" />
			<stop offset="100%" stop-color="#e4e4e7" stop-opacity="1" />
		</radialGradient>
	</defs>

	<rect width="1280" height="720" fill="url(#hf-vignette)" />
	<rect width="1280" height="720" fill="url(#hf-grid)" opacity="0.55" />

	<!-- viewfinder crop marks -->
	<g fill="none" stroke="#18181b" stroke-width="6" stroke-linecap="square">
		<path d="M64 128V64h64" />
		<path d="M1152 64h64v64" />
		<path d="M64 592v64h64" />
		<path d="M1216 592v64h-64" />
	</g>

	<!-- centre camcorder mark -->
	<g transform="translate(640 360)">
		<rect x="-116" y="-64" width="188" height="128" rx="22" fill="#18181b" />
		<path d="M72 -26 128 -58v116L72 26Z" fill="#18181b" />
		<circle cx="-58" cy="0" r="30" fill="none" stroke="#fafafa" stroke-width="7" />
		<circle cx="-58" cy="0" r="10" fill="#fafafa" />
		<circle cx="34" cy="-38" r="7" fill="#fafafa" />
	</g>

	<text x="640" y="502" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, monospace" font-size="21" letter-spacing="9" fill="#71717a">FRAME 16:9</text>
	<text x="640" y="556" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="34" font-weight="600" letter-spacing="-0.5" fill="#18181b">Cut the chaos.</text>
</svg>
